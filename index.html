<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tamagotchi</title>
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="gameBoy">
      <div class="gameBoy__screenBox">
        <div class="screen__characterLifeParamBox">
          <div class="screen__characterLifeParam">
            <img
              src="./img/IconHealth.png"
              alt="comic buuble with two z"
              width="40"
              height="40"
            />
            <p class="healthPoints"></p>
          </div>
          <div class="screen__characterLifeParam">
            <img
              src="./img/IconHunger.png"
              alt="comic buuble with two z"
              width="40"
              height="40"
            />
            <p class="points hungerPoints"></p>
          </div>
          <div class="screen__characterLifeParam">
            <img
              src="./img/IconSleep.png"
              alt="comic buuble with two z"
              width="40"
              height="40"
            />
            <p class="points energyPoints"></p>
          </div>
          <div class="screen__characterLifeParam playPoints">
            <img
              src="./img/IconFun.png"
              alt="comic buuble with two z"
              width="40"
              height="40"
            />
            <p class="points funPoints"></p>
          </div>
        </div>
        <div class="screen__character">
          <img
            class="Nimo-img"
            src="./img/NimoMoods/State=Standing.png"
            alt="pexel cat"
          />
          <img src="./img/line1.png" alt="white line" />
        </div>
        <div class="screen__characterState"><p>HAPPY</p></div>
      </div>
      <div class="gameBoy__buttonBox">
        <button class="gameBoy__button eat">
          <img
            src="./img/IconHunger.png"
            alt="comic buuble with two z"
            width="40"
            height="40"
          />
        </button>
        <button class="gameBoy__button sleep">
          <img
            src="./img/IconSleep.png"
            alt="comic buuble with two z"
            width="40"
            height="40"
          />
        </button>
        <button class="gameBoy__button play">
          <img
            src="./img/IconFun.png"
            alt="comic buuble with two z"
            width="40"
            height="40"
          />
        </button>
      </div>
    </div>
    <script src="./app.js" type="module"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tamagotchi</title>
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="gameBoy">
      <div class="gameBoy__screenBox">
        <div class="screen__characterLifeParamBox">
          <div class="screen__characterLifeParam lifePoints">
            <img
              src="./icons/IconHealth.png"
              alt="comic buuble with two z"
              width="40"
              height="40"
            />
            <p class="healthPoints"></p>
          </div>
          <div class="screen__characterLifeParam hungerPoints">
            <img
              src="./icons/IconHunger.png"
              alt="comic buuble with two z"
              width="40"
              height="40"
            />
            <p class="points">10</p>
          </div>
          <div class="screen__characterLifeParam leepPoints">
            <img
              src="./icons/IconSleep.png"
              alt="comic buuble with two z"
              width="40"
              height="40"
            />
            <p class="points">10</p>
          </div>
          <div class="screen__characterLifeParam playPoints">
            <img
              src="./icons/IconFun.png"
              alt="comic buuble with two z"
              width="40"
              height="40"
            />
            <p class="points">10</p>
          </div>
        </div>
        <div class="screen__character">
          <img src="./icons/Nimo.png" alt="pexel cat" />
          <img src="./icons/line1.png" alt="white line" />
        </div>
        <div class="screen__characterState"><p>HAPPY</p></div>
      </div>
      <div class="gameBoy__buttonBox">
        <button class="gameBoy__button eat">
          <img
            src="./icons/IconHunger.png"
            alt="comic buuble with two z"
            width="40"
            height="40"
          />
        </button>
        <button class="gameBoy__button sleep">
          <img
            src="./icons/IconSleep.png"
            alt="comic buuble with two z"
            width="40"
            height="40"
          />
        </button>
        <button class="gameBoy__button play">
          <img
            src="./icons/IconFun.png"
            alt="comic buuble with two z"
            width="40"
            height="40"
          />
        </button>
      </div>
    </div>
    <script src="./app.js" type="module"></script>
  </body>
</html>

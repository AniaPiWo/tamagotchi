<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tamagotchi</title>
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="gameBoy">
      <p class="bar">Energy <span class="health" /></p>
      <div class="gameBoy__screenBox"></div>
      <div class="gameBoy__buttonBox">
        <button class="gameBoy__button eat">
          <img src="./icons/apple.png" alt="pexel apple" />
        </button>
        <button class="gameBoy__button sleep">
          <img src="./icons/zzz.png" alt="comic buuble with two z" />
        </button>
        <button class="gameBoy__button play">
          <img src="./icons/ball.png" alt="pexel football" />
        </button>
      </div>
    </div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
